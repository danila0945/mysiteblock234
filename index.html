<!DOCTYPE html>

                border-top: 1px solid #888;

    <body>
        <div id="header">
            <h1>Nike Sneaker Gallery</h1>
        </div>
        <div id="nav">
            <ul>
                <li><a href="index.html">Главная</a></li>
