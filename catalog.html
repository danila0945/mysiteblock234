<!DOCTYPE html>
<html>
    <head>
        <title>Галерея кроссовок Nike</title>
        <style>

            }
            #footer {

    <body>

            <h1>Галерея кроссовок Nike</h1>

            <h2>Nike Air Max</h2>
            <p>Эти кроссовки идеально подходят для повседневной носки благодаря своей легкости и комфорту!</p>
        </div>

        <div class="sneaker">

            <h2>Nike React</h2>
            <p>Nike React обеспечивают отличную амортизацию и стильный внешний вид для активного образа жизни.</p>

        <div class="clear"></div>
